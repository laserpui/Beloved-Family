<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คำนวณสูตรน้ำพริกอ่อง - Recipe Calculator</title>
    
    <!-- นำเข้า Tailwind CSS สำหรับตกแต่ง -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า React และ ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- นำเข้า Babel เพื่อแปลง JSX ใน Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- นำเข้าฟอนต์ภาษาไทย (Sarabun) -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #fff7ed; /* Tailwind orange-50 */
            -webkit-tap-highlight-color: transparent;
        }
        /* ซ่อน Scrollbar ของตัวเลขเพื่อความสวยงาม */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ส่วนของไอคอน (SVG) ---
        const ChefHatIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/></svg>
        );

        const ScaleIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>
        );

        const RotateCcwIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );

        const UtensilsIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 1 0-10 0v13a8 8 0 0 0 16 0Z"/></svg>
        );

        const CookingPotIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12h20"/><path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8"/><path d="m4 8 16-4"/><path d="m8.86 6.78-.45-1.81a2 2 0 0 1 1.45-2.43l1.94-.48a2 2 0 0 1 2.43 1.46l.45 1.8"/><path d="M11.66 8.52 14 3"/></svg>
        );

        const InfoIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );

        const ArrowLeftIcon = ({ size = 20, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        );

        // --- ส่วนของโปรแกรมหลัก ---
        const RecipeCalculator = () => {
            // ข้อมูลตั้งต้นจากไฟล์ CSV (Base Recipe)
            const baseRecipe = [
                { name: 'หมูสับ', amount: 1, unit: 'กิโลกรัม', icon: '🐷' },
                { name: 'มะเขือเทศ', amount: 300, unit: 'กรัม', icon: '🍅' },
                { name: 'พริกแห้ง (เม็ดเล็ก)', amount: 30, unit: 'เม็ด', icon: '🌶️' },
                { name: 'พริกแห้ง (เม็ดใหญ่)', amount: 6, unit: 'เม็ด', icon: '🌶️' },
                { name: 'กระเทียมกลีบใหญ่', amount: 8, unit: 'กลีบ', icon: '🧄' },
                { name: 'หัวหอมแดง', amount: 8, unit: 'หัว', icon: '🧅' },
                { name: 'กะปิ', amount: 1, unit: 'ช้อนโต๊ะ', icon: '🦐' },
            ];

            const [currentRecipe, setCurrentRecipe] = useState(baseRecipe);
            const [scaleFactor, setScaleFactor] = useState(1);

            const handleInputChange = (index, newValue) => {
                let val = parseFloat(newValue);
                if (isNaN(val) || val < 0) val = 0;
                
                const baseAmount = baseRecipe[index].amount;
                // คำนวณอัตราส่วน (Ratio) จากสิ่งที่กรอกเทียบกับสูตรต้นฉบับ
                const newFactor = val / baseAmount;
                setScaleFactor(newFactor);
            };

            useEffect(() => {
                // อัปเดตปริมาณวัตถุดิบทั้งหมดตาม scaleFactor ใหม่
                const updatedRecipe = baseRecipe.map(item => ({
                    ...item,
                    amount: item.amount * scaleFactor
                }));
                setCurrentRecipe(updatedRecipe);
            }, [scaleFactor]);

            const handleReset = () => {
                setScaleFactor(1);
            };

            const formatNumber = (num) => {
                // แสดงทศนิยมไม่เกิน 2 ตำแหน่ง และตัดเลข 0 ต่อท้ายออก
                return parseFloat(num.toFixed(2));
            };

            return (
                <div className="min-h-screen py-4 sm:py-8 px-3 sm:px-4 flex justify-center items-start">
                    <div className="w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden border border-orange-100">
                        
                        {/* Header Section */}
                        <div className="bg-gradient-to-r from-orange-500 to-red-600 p-6 sm:p-8 text-white text-center relative overflow-hidden">
                            {/* ปุ่มกลับหน้าแรก */}
                            <div className="absolute top-4 left-4 z-20">
                                <a href="../index.html" className="inline-flex items-center gap-2 bg-white/20 hover:bg-white/30 active:scale-95 text-white text-sm font-semibold px-4 py-2 rounded-xl backdrop-blur-md transition-all shadow-sm border border-white/10">
                                    <ArrowLeftIcon size={16} />
                                    <span>กลับหน้าหลัก</span>
                                </a>
                            </div>

                            <ChefHatIcon className="w-14 h-14 mx-auto mb-3 relative z-10 text-white" />
                            <h1 className="text-2xl sm:text-4xl font-bold relative z-10 drop-shadow-md mb-2">คำนวณสูตรน้ำพริกอ่อง</h1>
                            <p className="text-orange-100 mt-1 relative z-10 text-sm sm:text-base opacity-90">
                                คำนวณปริมาณวัตถุดิบอัตโนมัติ เพียงกรอกสิ่งที่คุณมี
                            </p>
                        </div>

                        {/* Control Panel */}
                        <div className="p-4 sm:p-6 bg-orange-50 border-b border-orange-200">
                            <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                                <div className="flex items-center gap-3 bg-white px-5 py-3 rounded-xl shadow-sm w-full sm:w-auto border border-orange-100">
                                    <div className="bg-orange-100 p-2 rounded-lg">
                                        <ScaleIcon className="w-5 h-5 text-orange-600" />
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-500 font-medium">สัดส่วนปัจจุบัน</p>
                                        <p className="text-lg font-bold text-orange-600 leading-tight">{formatNumber(scaleFactor)} เท่า</p>
                                    </div>
                                </div>
                                
                                <button 
                                    onClick={handleReset}
                                    className="flex items-center justify-center gap-2 px-5 py-3 bg-white hover:bg-gray-50 text-gray-700 rounded-xl transition-colors text-sm font-bold w-full sm:w-auto shadow-sm border border-gray-200 active:scale-95"
                                >
                                    <RotateCcwIcon className="w-4 h-4" />
                                    รีเซ็ตสูตรต้นฉบับ
                                </button>
                            </div>
                            
                            <div className="mt-4 flex items-start gap-2 text-sm text-gray-600 bg-orange-100/50 p-3 rounded-lg">
                                <InfoIcon className="w-5 h-5 text-orange-500 flex-shrink-0 mt-0.5" />
                                <p><strong>วิธีใช้:</strong> พิมพ์ตัวเลขในช่อง "ปริมาณที่ต้องการ" ของวัตถุดิบใดก็ได้ที่คุณมี ระบบจะคำนวณส่วนผสมอื่นๆ ให้สอดคล้องกันโดยอัตโนมัติ</p>
                            </div>
                        </div>

                        {/* Ingredients Table / List */}
                        <div className="p-4 sm:p-6 bg-white">
                            <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <UtensilsIcon className="w-5 h-5 text-orange-500" /> วัตถุดิบที่ต้องเตรียม
                            </h2>
                            
                            {/* Desktop View: Table (ซ่อนบนหน้าจอมือถือ) */}
                            <div className="hidden sm:block overflow-hidden rounded-xl border border-gray-200">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-50 text-gray-700 text-sm tracking-wider">
                                            <th className="p-4 font-bold border-b border-gray-200">วัตถุดิบ</th>
                                            <th className="p-4 font-bold text-center w-48 border-b border-gray-200">ปริมาณที่ต้องการ</th>
                                            <th className="p-4 font-bold border-b border-gray-200 w-32">หน่วย</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {currentRecipe.map((item, index) => (
                                            <tr key={index} className="hover:bg-orange-50/30 transition-colors">
                                                <td className="p-4">
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-2xl" role="img" aria-label={item.name}>{item.icon}</span>
                                                        <div>
                                                            <p className="font-bold text-gray-800 text-base">{item.name}</p>
                                                            <p className="text-xs text-gray-400 mt-0.5">
                                                                สูตรตั้งต้น: {baseRecipe[index].amount} {item.unit}
                                                            </p>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td className="p-4 text-center">
                                                    <input
                                                        type="number"
                                                        min="0"
                                                        step="any"
                                                        value={formatNumber(item.amount)}
                                                        onChange={(e) => handleInputChange(index, e.target.value)}
                                                        className="w-full bg-white border border-gray-300 text-gray-900 text-center text-lg rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 p-2.5 font-bold transition-all"
                                                    />
                                                </td>
                                                <td className="p-4 text-gray-600 font-medium text-base">
                                                    {item.unit}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* Mobile View: Cards (ซ่อนบนหน้าจอคอมพิวเตอร์) */}
                            <div className="sm:hidden space-y-3">
                                {currentRecipe.map((item, index) => (
                                    <div key={index} className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm flex flex-col gap-3">
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center gap-3">
                                                <span className="text-2xl bg-orange-50 p-2 rounded-full leading-none">{item.icon}</span>
                                                <div>
                                                    <p className="font-bold text-gray-800 text-lg leading-tight">{item.name}</p>
                                                    <p className="text-xs text-gray-400 mt-1">สูตรตั้งต้น: {baseRecipe[index].amount} {item.unit}</p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <input
                                                type="number"
                                                min="0"
                                                step="any"
                                                value={formatNumber(item.amount)}
                                                onChange={(e) => handleInputChange(index, e.target.value)}
                                                className="w-full flex-1 bg-gray-50 border border-gray-300 text-gray-900 text-center text-xl rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 focus:bg-white p-3 font-bold transition-all outline-none"
                                            />
                                            <div className="bg-gray-100 border border-gray-200 text-gray-700 font-semibold px-4 py-3 rounded-lg min-w-[80px] text-center">
                                                {item.unit}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Cooking Steps Section (Static Content) */}
                        <div className="p-4 sm:p-6 bg-gradient-to-b from-orange-50/50 to-white border-t border-orange-100">
                            <h2 className="text-xl sm:text-2xl font-bold text-orange-700 mb-5 flex items-center gap-2">
                                <CookingPotIcon className="w-6 h-6 sm:w-7 sm:h-7" /> วิธีทำน้ำพริกอ่อง
                            </h2>
                            
                            <div className="space-y-6 text-gray-700 text-sm sm:text-base">
                                <div className="flex gap-4">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold shadow-sm">1</div>
                                    <div>
                                        <h3 className="font-bold text-gray-800 text-lg mb-1">โขลกพริกแกง</h3>
                                        <p>นำพริกแห้งเม็ดเล็กและเม็ดใหญ่ (แช่น้ำให้นิ่มก่อน) หัวหอมแดง กระเทียม และกะปิ มาโขลกหรือปั่นรวมกันให้ละเอียดเป็นเนื้อเดียวกัน</p>
                                    </div>
                                </div>
                                
                                <div className="flex gap-4">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold shadow-sm">2</div>
                                    <div>
                                        <h3 className="font-bold text-gray-800 text-lg mb-1">ผัดเครื่องแกง</h3>
                                        <p>ตั้งกระทะใส่น้ำมันพืชเล็กน้อย ใช้ไฟกลาง นำพริกแกงที่โขลกไว้ลงไปผัดกวนจนส่งกลิ่นหอมฟุ้ง (ระวังอย่าให้ไหม้)</p>
                                    </div>
                                </div>

                                <div className="flex gap-4">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold shadow-sm">3</div>
                                    <div>
                                        <h3 className="font-bold text-gray-800 text-lg mb-1">รวนหมูสับ</h3>
                                        <p>ใส่หมูสับลงไปในกระทะ ผัดคลุกเคล้ากับพริกแกงจนหมูสับเริ่มสุกและร่วนเข้ากันดี</p>
                                    </div>
                                </div>

                                <div className="flex gap-4">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold shadow-sm">4</div>
                                    <div>
                                        <h3 className="font-bold text-gray-800 text-lg mb-1">เคี่ยวมะเขือเทศ</h3>
                                        <p>ใส่มะเขือเทศหั่นเต๋าลงไป ผัดจนมะเขือเทศสุกนิ่ม น้ำจากมะเขือเทศจะค่อยๆ ออกมา ให้ลดเป็นไฟอ่อนแล้วเคี่ยวต่อไปจนน้ำขลุกขลิกและมะเขือเทศเละกลืนไปกับเนื้อหมู</p>
                                    </div>
                                </div>

                                <div className="flex gap-4">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold shadow-sm">5</div>
                                    <div>
                                        <h3 className="font-bold text-gray-800 text-lg mb-1">ปรุงรสและจัดเสิร์ฟ</h3>
                                        <p>ชิมรสชาติ (ปกติจะได้ความเปรี้ยวหวานจากมะเขือเทศและความเค็มจากกะปิแล้ว) หากต้องการสามารถเติมน้ำปลาหรือน้ำตาลทรายได้เล็กน้อย ปิดเตา ตักใส่ถ้วย โรยด้วยต้นหอมผักชี ทานคู่กับผักสดและแคบหมู</p>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Tips Card */}
                            <div className="mt-8 bg-yellow-50 border border-yellow-200 rounded-xl p-5">
                                <h4 className="font-bold text-yellow-800 flex items-center gap-2 mb-2">
                                    <span>💡</span> เคล็ดลับความอร่อย
                                </h4>
                                <ul className="list-disc list-inside text-yellow-700 space-y-1 text-sm sm:text-base">
                                    <li>ใช้น้ำล้างครก (น้ำเปล่าเล็กน้อยกลั้วครกที่ใช้โขลกพริกแกง) เทใส่ตอนผัดมะเขือเทศ จะช่วยเพิ่มความนัวและกลมกล่อม</li>
                                    <li>เลือกใช้ "มะเขือเทศส้ม" หรือมะเขือเทศลูกเล็ก จะให้รสเปรี้ยวอมหวานที่อร่อยเป็นธรรมชาติกว่ามะเขือเทศลูกใหญ่</li>
                                    <li>หากชอบเผ็ด สามารถเพิ่มสัดส่วนของพริกแห้งเม็ดเล็กได้ตามต้องการ</li>
                                </ul>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="bg-gray-50 p-4 sm:p-5 text-center border-t border-gray-100">
                            <div className="inline-flex items-center gap-2 text-gray-500 text-sm font-medium">
                                <UtensilsIcon className="w-4 h-4" />
                                <span>ทำตามสูตรเป๊ะ อร่อยชัวร์!</span>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RecipeCalculator />);
    </script>
</body>
</html>
